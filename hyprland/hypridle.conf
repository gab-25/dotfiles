general {
    lock_cmd = hyprlock
    before_sleep_cmd = hyprlock
    after_sleep_cmd = hyprctl dispatch dpms on
    inhibit_sleep = 3
}

# Screensaver after 2.5 minutes
listener {
    timeout = 150
    on-timeout = hyprlock
}

# Turn off displays after 10 minutes
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
