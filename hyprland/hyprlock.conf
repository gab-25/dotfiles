general {
    ignore_empty_input = true
}

background {
    monitor =
    color = rgba(1a1a2eee)
    blur_passes = 3
    blur_size = 8
}

animations {
    enabled = false
}

input-field {
    monitor =
    size = 650, 80
    position = 0, 0
    halign = center
    valign = center

    inner_color = rgba(1e1e3000)
    outer_color = rgba(33ccffee)
    outline_thickness = 2

    font_family = JetBrainsMono Nerd Font
    font_color = rgb(ffffff)

    placeholder_text = Enter Password
    check_color = rgba(00ff99ee)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}
