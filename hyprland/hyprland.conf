###############################################################################
# Hyprland — configurazione in stile Omarchy (port standalone, senza framework)
# Struttura a file separati, ognuno con una responsabilità. I file vengono
# linkati in ~/.config/hypr/ da install.sh.
###############################################################################

################
### MONITORS ###
################
# See https://wiki.hypr.land/Configuring/Monitors/
# Adjust scale for your display: 1 for 1080p/1440p, 2 for HiDPI/retina, 1.6 for 4K@27"
monitor = ,preferred,auto,1

#####################
### SUB-CONFIGS   ###
#####################
source = ~/.config/hypr/envs.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/windows.conf
source = ~/.config/hypr/autostart.conf

#########################
### APP VARIABLES     ###
#########################
$terminal    = alacritty
$browser     = google-chrome-stable
$fileManager = nautilus
$menu        = rofi -show drun

####################
### KEYBINDINGS  ###
####################
source = ~/.config/hypr/bindings/apps.conf
source = ~/.config/hypr/bindings/tiling.conf
source = ~/.config/hypr/bindings/media.conf
source = ~/.config/hypr/bindings/clipboard.conf
source = ~/.config/hypr/bindings/utilities.conf
