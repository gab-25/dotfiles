###################
### CLIPBOARD #####
###################

# Universal copy / paste / cut (Ctrl+Insert / Shift+Insert — works in most terminals)
bind = SUPER, C, sendshortcut, CTRL,  Insert, activewindow
bind = SUPER, V, sendshortcut, SHIFT, Insert, activewindow
bind = SUPER, X, sendshortcut, CTRL,  X,      activewindow

# Clipboard history manager (requires cliphist + wl-clipboard + rofi)
bind = SUPER CTRL, V, exec, cliphist list | rofi -dmenu -p clipboard | cliphist decode | wl-copy
