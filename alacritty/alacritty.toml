# Alacritty configuration

[general]
import = [
  "~/.config/alacritty/themes/gruvbox_dark.toml",
]

[cursor]
style = { blinking = "On" }
blink_interval = 500   # blink period in ms
blink_timeout = 0      # 0 = blink forever, never stops

# Start tmux automatically — only when launched from Alacritty.
# Attaches to the "main" session if it exists, otherwise creates it.
[terminal.shell]
program = "tmux"
args = ["new-session", "-A", "-s", "main"]
