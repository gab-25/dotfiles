# ~/.tmux.conf

# --- General ---------------------------------------------------------------
# Change prefix from Ctrl+b to Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix                  # press Ctrl+a twice to send it to the app

set -g mouse on                      # mouse: select panes, resize, scroll
set -g history-limit 50000           # bigger scrollback buffer
set -sg escape-time 10               # faster key response (vim-friendly)
set -g focus-events on               # forward focus events to apps (vim, etc.)
set -g base-index 1                  # windows start at 1
setw -g pane-base-index 1            # panes start at 1
set -g renumber-windows on           # renumber windows when one closes

# True color / 256 color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm*:Tc"

# --- Key bindings ----------------------------------------------------------
# Reload config with prefix + r
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes with | and - (and keep the current path)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window keeps current path
bind c new-window -c "#{pane_current_path}"

# Navigate panes with Alt+arrows (no prefix needed)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Switch windows with Shift+arrows (no prefix needed)
bind -n S-Left  previous-window
bind -n S-Right next-window

# Resize panes with prefix + H/J/K/L (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy mode (vi style) --------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# --- Plugins (tpm) ---------------------------------------------------------
# Install/update with: prefix + I (install), prefix + U (update), prefix + alt+u (clean)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Gruvbox theme
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark'          # 'dark', 'dark256', or 'light'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'   # restore pane contents too
set -g @continuum-restore 'on'                 # auto-restore on tmux start
set -g @continuum-save-interval '15'           # autosave every 15 minutes

# Keep this line at the very bottom: initialize tpm
run '~/.tmux/plugins/tpm/tpm'
